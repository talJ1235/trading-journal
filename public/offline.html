<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Trading Journal</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background: #0f0f0f;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #1e3a5f;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      h1 { font-size: 22px; font-weight: 700; color: #fff; }
      p { font-size: 14px; color: #71717a; max-width: 280px; line-height: 1.6; }
      button {
        margin-top: 8px;
        padding: 10px 24px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #2563eb; }
    </style>
  </head>
  <body>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>No internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Reload</button>
  </body>
</html>
